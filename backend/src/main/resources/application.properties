# ==========================================
# Server & API Context Path
# ==========================================
spring.application.name=backend
server.port=8080
server.servlet.context-path=/api/v1

# ==========================================
# PostgreSQL Datasource Configuration
# ==========================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/inventory_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# Hibernate Envers (Auditing)
# ==========================================
spring.jpa.properties.org.hibernate.envers.audit_table_suffix=_aud
spring.jpa.properties.org.hibernate.envers.revision_field_name=rev
spring.jpa.properties.org.hibernate.envers.revision_type_field_name=revtype

# ==========================================
# JWT Configuration
# ==========================================
jwt.secret=${JWT_SECRET:94a08da1fecbb6e8b46990538c7b84f3ccbc67856e79b9dcfa684699050d53c2}
# Default 15 minutes in milliseconds
jwt.access.expiration=${JWT_ACCESS_EXPIRATION:900000}
# Default 7 days in milliseconds
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ==========================================
# Cookie Security
# ==========================================
# Set to false in local development if not using HTTPS
cookie.secure=${COOKIE_SECURE:true}
