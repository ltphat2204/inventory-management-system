# ==========================================
# Server & API Context Path
# ==========================================
spring.application.name=backend
server.port=8080
server.servlet.context-path=/api/v1

# ==========================================
# PostgreSQL Datasource Configuration
# ==========================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/inventory_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# Hibernate Envers (Auditing)
# ==========================================
spring.jpa.properties.org.hibernate.envers.audit_table_suffix=_aud
spring.jpa.properties.org.hibernate.envers.revision_field_name=rev
spring.jpa.properties.org.hibernate.envers.revision_type_field_name=revtype

# ==========================================
# JWT Configuration
# ==========================================
# 256-bit secret key (generate a safe one in production)
jwt.secret=94a08da1fecbb6e8b46990538c7b84f3ccbc67856e79b9dcfa684699050d53c2
# 15 minutes in milliseconds
jwt.access.expiration=900000
# 7 days in milliseconds
jwt.refresh.expiration=604800000
